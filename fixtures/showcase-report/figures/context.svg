<svg xmlns="http://www.w3.org/2000/svg" width="560" height="260" viewBox="0 0 560 260">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 z" fill="#334155"/>
    </marker>
  </defs>
  <!-- center system -->
  <rect x="220" y="95" width="120" height="70" rx="6" fill="#dbeafe" stroke="#1e40af" stroke-width="1.5"/>
  <text x="280" y="125" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold">Kantina</text>
  <text x="280" y="145" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#334155">order + tally core</text>
  <!-- student -->
  <rect x="20" y="40" width="120" height="46" rx="6" fill="#dcfce7" stroke="#166534"/>
  <text x="80" y="59" text-anchor="middle" font-family="sans-serif" font-size="13">Student</text>
  <text x="80" y="76" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#334155">ordering client</text>
  <line x1="140" y1="72" x2="216" y2="105" stroke="#334155" marker-end="url(#arrow)"/>
  <text x="160" y="76" font-family="sans-serif" font-size="11" fill="#334155">order / cancel</text>
  <!-- sso -->
  <rect x="20" y="170" width="120" height="46" rx="6" fill="#f3e8ff" stroke="#6b21a8"/>
  <text x="80" y="189" text-anchor="middle" font-family="sans-serif" font-size="13">Academy SSO</text>
  <text x="80" y="206" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#334155">authentication</text>
  <line x1="216" y1="150" x2="140" y2="186" stroke="#334155" marker-end="url(#arrow)"/>
  <text x="150" y="178" font-family="sans-serif" font-size="11" fill="#334155">verify login</text>
  <!-- kitchen -->
  <rect x="420" y="40" width="120" height="46" rx="6" fill="#fef9c3" stroke="#854d0e"/>
  <text x="480" y="59" text-anchor="middle" font-family="sans-serif" font-size="13">Kitchen display</text>
  <text x="480" y="76" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#334155">live tally</text>
  <line x1="344" y1="105" x2="420" y2="72" stroke="#334155" marker-end="url(#arrow)"/>
  <text x="352" y="78" font-family="sans-serif" font-size="11" fill="#334155">tally events</text>
  <!-- manager -->
  <rect x="420" y="170" width="120" height="46" rx="6" fill="#fee2e2" stroke="#991b1b"/>
  <text x="480" y="189" text-anchor="middle" font-family="sans-serif" font-size="13">Manager console</text>
  <text x="480" y="206" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#334155">menu + lock-in</text>
  <line x1="420" y1="186" x2="344" y2="150" stroke="#334155" marker-end="url(#arrow)"/>
  <text x="352" y="182" font-family="sans-serif" font-size="11" fill="#334155">menu, cut-off</text>
</svg>
