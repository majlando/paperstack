<svg xmlns="http://www.w3.org/2000/svg" width="480" height="280" viewBox="0 0 480 280">
  <!-- axes -->
  <line x1="50" y1="20" x2="50" y2="230" stroke="#334155" stroke-width="1.5"/>
  <line x1="50" y1="230" x2="450" y2="230" stroke="#334155" stroke-width="1.5"/>
  <!-- y labels -->
  <text x="42" y="35" text-anchor="end" font-family="sans-serif" font-size="11" fill="#334155">19</text>
  <text x="42" y="130" text-anchor="end" font-family="sans-serif" font-size="11" fill="#334155">10</text>
  <text x="42" y="234" text-anchor="end" font-family="sans-serif" font-size="11" fill="#334155">0</text>
  <text x="20" y="135" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#334155" transform="rotate(-90 20 135)">points remaining</text>
  <!-- x labels -->
  <text x="50" y="248" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#334155">day 1</text>
  <text x="250" y="248" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#334155">day 5</text>
  <text x="450" y="248" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#334155">day 10</text>
  <!-- ideal line -->
  <line x1="50" y1="30" x2="450" y2="230" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5 4"/>
  <!-- actual line: 19,19,16,14,14,11,8,5,2,0 -->
  <polyline points="50,30 94,30 139,61 183,82 228,82 272,114 317,145 361,177 406,209 450,230"
            fill="none" stroke="#1e40af" stroke-width="2.5"/>
  <circle cx="50" cy="30" r="3" fill="#1e40af"/>
  <circle cx="94" cy="30" r="3" fill="#1e40af"/>
  <circle cx="139" cy="61" r="3" fill="#1e40af"/>
  <circle cx="183" cy="82" r="3" fill="#1e40af"/>
  <circle cx="228" cy="82" r="3" fill="#1e40af"/>
  <circle cx="272" cy="114" r="3" fill="#1e40af"/>
  <circle cx="317" cy="145" r="3" fill="#1e40af"/>
  <circle cx="361" cy="177" r="3" fill="#1e40af"/>
  <circle cx="406" cy="209" r="3" fill="#1e40af"/>
  <circle cx="450" cy="230" r="3" fill="#1e40af"/>
  <!-- legend -->
  <line x1="300" y1="35" x2="330" y2="35" stroke="#1e40af" stroke-width="2.5"/>
  <text x="336" y="39" font-family="sans-serif" font-size="11" fill="#334155">actual</text>
  <line x1="300" y1="52" x2="330" y2="52" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="336" y="56" font-family="sans-serif" font-size="11" fill="#334155">ideal</text>
</svg>
