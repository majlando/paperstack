<svg xmlns="http://www.w3.org/2000/svg" width="460" height="300" viewBox="0 0 460 300">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 z" fill="#334155"/>
    </marker>
  </defs>
  <!-- presentation -->
  <rect x="40" y="20" width="280" height="60" rx="6" fill="#dbeafe" stroke="#1e40af" stroke-width="1.5"/>
  <text x="180" y="45" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold">Presentation</text>
  <text x="180" y="65" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#334155">JavaFX controllers: client, kitchen, manager</text>
  <line x1="180" y1="80" x2="180" y2="110" stroke="#334155" marker-end="url(#arrow)"/>
  <!-- domain -->
  <rect x="40" y="115" width="280" height="70" rx="6" fill="#dcfce7" stroke="#166534" stroke-width="1.5"/>
  <text x="180" y="140" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold">Domain</text>
  <text x="180" y="158" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#334155">OrderService · BatchService · ReportService</text>
  <text x="180" y="174" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#334155">repository interfaces live here</text>
  <line x1="180" y1="185" x2="180" y2="215" stroke="#334155" marker-end="url(#arrow)"/>
  <!-- data -->
  <rect x="40" y="220" width="280" height="60" rx="6" fill="#fef9c3" stroke="#854d0e" stroke-width="1.5"/>
  <text x="180" y="245" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold">Data</text>
  <text x="180" y="265" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#334155">SQLite repositories, schema, audit log</text>
  <!-- dependency inversion note -->
  <line x1="330" y1="245" x2="330" y2="155" stroke="#334155" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="345" y="190" font-family="sans-serif" font-size="11" fill="#334155">implements</text>
  <text x="345" y="205" font-family="sans-serif" font-size="11" fill="#334155">domain</text>
  <text x="345" y="220" font-family="sans-serif" font-size="11" fill="#334155">interfaces</text>
</svg>
