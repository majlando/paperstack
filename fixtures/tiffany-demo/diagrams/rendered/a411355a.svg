<svg xmlns="http://www.w3.org/2000/svg" width="260" height="430" viewBox="0 0 260 430" font-family="sans-serif">
  <defs>
    <marker id="c-arrow" markerWidth="12" markerHeight="12" refX="10" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="none" stroke="#52525b" stroke-width="1.2"/>
    </marker>
  </defs>
  <g stroke="#a1a1aa" stroke-width="1">
    <line x1="130" y1="78" x2="130" y2="108" marker-end="url(#c-arrow)"/>
    <line x1="130" y1="186" x2="130" y2="216" marker-end="url(#c-arrow)"/>
    <line x1="130" y1="294" x2="130" y2="324" marker-end="url(#c-arrow)"/>
  </g>
  <g font-size="10" fill="#52525b">
    <text x="120" y="92" text-anchor="end">1</text><text x="140" y="104">*</text>
    <text x="120" y="200" text-anchor="end">1</text><text x="140" y="212">*</text>
    <text x="120" y="308" text-anchor="end">1</text><text x="140" y="320">*</text>
  </g>
  <!-- Profile -->
  <g>
    <rect x="50" y="14" width="160" height="62" fill="#f4f4f5" stroke="#71717a"/>
    <rect x="50" y="14" width="160" height="20" fill="#e4e4e7" stroke="#71717a"/>
    <text x="130" y="28" text-anchor="middle" font-size="12" font-weight="bold">Profile</text>
    <text x="58" y="49" font-size="11">+String name</text>
    <text x="58" y="65" font-size="11">+String externalId</text>
  </g>
  <!-- Box -->
  <g>
    <rect x="50" y="122" width="160" height="46" fill="#f4f4f5" stroke="#71717a"/>
    <rect x="50" y="122" width="160" height="20" fill="#e4e4e7" stroke="#71717a"/>
    <text x="130" y="136" text-anchor="middle" font-size="12" font-weight="bold">Box</text>
    <text x="58" y="157" font-size="11">+int boxNumber</text>
  </g>
  <!-- Document -->
  <g>
    <rect x="50" y="230" width="160" height="46" fill="#f4f4f5" stroke="#71717a"/>
    <rect x="50" y="230" width="160" height="20" fill="#e4e4e7" stroke="#71717a"/>
    <text x="130" y="244" text-anchor="middle" font-size="12" font-weight="bold">Document</text>
    <text x="58" y="265" font-size="11">+String barcode</text>
  </g>
  <!-- File -->
  <g>
    <rect x="50" y="338" width="160" height="46" fill="#f4f4f5" stroke="#71717a"/>
    <rect x="50" y="338" width="160" height="20" fill="#e4e4e7" stroke="#71717a"/>
    <text x="130" y="352" text-anchor="middle" font-size="12" font-weight="bold">File</text>
    <text x="58" y="373" font-size="11">+int page</text>
  </g>
</svg>
