<svg xmlns="http://www.w3.org/2000/svg" width="520" height="320" viewBox="0 0 520 320" font-family="sans-serif">
  <defs>
    <marker id="s-solid" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3f3f46"/>
    </marker>
    <marker id="s-open" markerWidth="12" markerHeight="12" refX="9" refY="5" orient="auto">
      <path d="M0,0 L9,5 L0,10" fill="none" stroke="#3f3f46" stroke-width="1.2"/>
    </marker>
  </defs>
  <!-- lifelines -->
  <g stroke="#a1a1aa" stroke-width="1" stroke-dasharray="3 3">
    <line x1="70" y1="48" x2="70" y2="300"/>
    <line x1="210" y1="48" x2="210" y2="300"/>
    <line x1="340" y1="48" x2="340" y2="300"/>
    <line x1="460" y1="48" x2="460" y2="300"/>
  </g>
  <!-- actor heads -->
  <g font-size="11" text-anchor="middle">
    <g fill="#f4f4f5" stroke="#71717a"><rect x="30" y="22" width="80" height="24"/><rect x="170" y="22" width="80" height="24"/><rect x="300" y="22" width="80" height="24"/><rect x="420" y="22" width="80" height="24"/></g>
    <g fill="#27272a" font-weight="bold"><text x="70" y="38">Operator</text><text x="210" y="38">ScanService</text><text x="340" y="38">BarcodeReader</text><text x="460" y="38">DocumentDao</text></g>
  </g>
  <!-- messages -->
  <g font-size="10.5" fill="#3f3f46">
    <line x1="70" y1="80" x2="208" y2="80" stroke="#3f3f46" marker-end="url(#s-solid)"/>
    <text x="139" y="74" text-anchor="middle">scanPage(image)</text>

    <line x1="210" y1="108" x2="338" y2="108" stroke="#3f3f46" marker-end="url(#s-solid)"/>
    <text x="274" y="102" text-anchor="middle">detect(image)</text>

    <line x1="340" y1="136" x2="212" y2="136" stroke="#3f3f46" stroke-dasharray="4 3" marker-end="url(#s-open)"/>
    <text x="276" y="130" text-anchor="middle">barcode / none</text>

    <rect x="135" y="154" width="150" height="30" fill="#fef9c3" stroke="#ca8a04"/>
    <text x="210" y="173" text-anchor="middle" fill="#713f12">a barcode opens a new Document</text>

    <line x1="210" y1="212" x2="458" y2="212" stroke="#3f3f46" marker-end="url(#s-solid)"/>
    <text x="334" y="206" text-anchor="middle">append(file, document)</text>

    <line x1="460" y1="240" x2="212" y2="240" stroke="#3f3f46" stroke-dasharray="4 3" marker-end="url(#s-open)"/>
    <text x="336" y="234" text-anchor="middle">saved</text>

    <line x1="210" y1="270" x2="72" y2="270" stroke="#3f3f46" stroke-dasharray="4 3" marker-end="url(#s-open)"/>
    <text x="141" y="264" text-anchor="middle">page added</text>
  </g>
</svg>
