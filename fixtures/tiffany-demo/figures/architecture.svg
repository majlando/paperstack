<svg xmlns="http://www.w3.org/2000/svg" width="460" height="300" viewBox="0 0 460 300">
  <defs>
    <marker id="a-arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 z" fill="#334155"/>
    </marker>
  </defs>
  <g font-family="sans-serif">
    <!-- presentation -->
    <rect x="40" y="20" width="280" height="62" rx="6" fill="#dbeafe" stroke="#1e40af" stroke-width="1.5"/>
    <text x="180" y="45" text-anchor="middle" font-size="14" font-weight="bold">Presentation (GUI)</text>
    <text x="180" y="66" text-anchor="middle" font-size="11" fill="#334155">JavaFX: scan, split, metadata, audit views</text>
    <line x1="180" y1="82" x2="180" y2="112" stroke="#334155" marker-end="url(#a-arrow)"/>

    <!-- business logic -->
    <rect x="40" y="117" width="280" height="72" rx="6" fill="#dcfce7" stroke="#166534" stroke-width="1.5"/>
    <text x="180" y="142" text-anchor="middle" font-size="14" font-weight="bold">Business Logic (BLL)</text>
    <text x="180" y="160" text-anchor="middle" font-size="11" fill="#334155">ScanService · ExportService · AuditService</text>
    <text x="180" y="176" text-anchor="middle" font-size="11" fill="#334155">DAO interfaces declared here</text>
    <line x1="180" y1="189" x2="180" y2="219" stroke="#334155" marker-end="url(#a-arrow)"/>

    <!-- data access -->
    <rect x="40" y="224" width="280" height="62" rx="6" fill="#fef9c3" stroke="#854d0e" stroke-width="1.5"/>
    <text x="180" y="249" text-anchor="middle" font-size="14" font-weight="bold">Data Access (DAL)</text>
    <text x="180" y="270" text-anchor="middle" font-size="11" fill="#334155">MockDao · JdbcDao over MSSQL · audit log</text>

    <!-- dependency inversion -->
    <line x1="330" y1="250" x2="330" y2="158" stroke="#334155" stroke-dasharray="4 3" marker-end="url(#a-arrow)"/>
    <text x="345" y="196" font-size="11" fill="#334155">implements</text>
    <text x="345" y="211" font-size="11" fill="#334155">BLL</text>
    <text x="345" y="226" font-size="11" fill="#334155">interfaces</text>
  </g>
</svg>
