<svg xmlns="http://www.w3.org/2000/svg" width="240" height="240" viewBox="0 0 240 240">
  <defs>
    <linearGradient id="beam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#22d3ee" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- rounded brand card -->
  <rect x="20" y="20" width="200" height="200" rx="28" fill="#0f172a"/>
  <rect x="20" y="20" width="200" height="200" rx="28" fill="none" stroke="#1e293b" stroke-width="2"/>
  <!-- document being scanned -->
  <rect x="74" y="58" width="92" height="118" rx="8" fill="#f8fafc"/>
  <rect x="74" y="58" width="92" height="118" rx="8" fill="none" stroke="#cbd5e1" stroke-width="1.5"/>
  <line x1="88" y1="84" x2="152" y2="84" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="88" y1="100" x2="152" y2="100" stroke="#cbd5e1" stroke-width="4" stroke-linecap="round"/>
  <line x1="88" y1="116" x2="134" y2="116" stroke="#cbd5e1" stroke-width="4" stroke-linecap="round"/>
  <line x1="88" y1="148" x2="152" y2="148" stroke="#cbd5e1" stroke-width="4" stroke-linecap="round"/>
  <!-- scan beam -->
  <rect x="58" y="124" width="124" height="10" rx="5" fill="url(#beam)"/>
  <line x1="58" y1="129" x2="182" y2="129" stroke="#22d3ee" stroke-width="2"/>
  <!-- diamond accent (the "Tiffany" jewel) -->
  <path d="M120 30 l16 16 -16 16 -16 -16 z" fill="#38bdf8"/>
  <path d="M120 30 l16 16 -16 16 z" fill="#0ea5e9"/>
  <text x="120" y="210" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#f8fafc" letter-spacing="2">TIFFANY</text>
</svg>
